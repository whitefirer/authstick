name: Deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - name: Download latest firmware from Release
        run: |
          curl -sL https://github.com/whitefirer/authstick/releases/latest/download/authstick-merged.bin -o web-flash/authstick-merged.bin || echo "No release firmware yet, using local fallback"
          mkdir -p _site && cp -r web-flash/* _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
