name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware and merged image
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.1
          target: esp32s3
          path: firmware
          command: |
            # Force 8MB flash so app partition is big enough
            echo "CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y" >> sdkconfig.defaults
            echo "CONFIG_PARTITION_TABLE_SINGLE_APP_LARGE=y" >> sdkconfig.defaults
            idf.py build
            mkdir -p ../dist
            cd build
            esptool.py --chip esp32s3 merge_bin -o ../../dist/authstick-merged.bin @flash_args

      - name: Checksums
        run: |
          cd dist
          sha256sum authstick-merged.bin > authstick-merged.bin.sha256
          cat authstick-merged.bin.sha256

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/authstick-merged.bin
          body: |
            Automated build from ${{ github.ref_name }}
            SHA256: see attached .sha256 file
