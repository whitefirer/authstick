name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install ESP-IDF
        run: |
          git clone --depth 1 --branch v5.5 https://github.com/espressif/esp-idf.git ~/esp-idf
          cd ~/esp-idf && git submodule update --init --depth 1 components/bt/host/nimble/nimble components/esp_wifi/lib components/esptool_py/esptool components/lwip/lwip components/mbedtls/mbedtls components/mbedtls/mbedtls/3rdparty components/esp_driver_i2c components/esp_driver_gpio components/esp_driver_spi components/soc/esp32s3

      - name: Build firmware
        run: |
          source ~/esp-idf/export.sh
          cd firmware
          # Install component dependencies
          python -m pip install idf-component-manager
          idf.py set-target esp32s3
          # Download components
          idf.py reconfigure
          idf.py build

      - name: Merge firmware
        run: |
          source ~/esp-idf/export.sh
          cd firmware
          mkdir -p ../web-flash
          python -m esptool --chip esp32s3 merge_bin \
            -o ../web-flash/authstick-merged.bin \
            --flash_mode dio --flash_size 8MB --flash_freq 80m \
            0x0 build/bootloader/bootloader.bin \
            0x8000 build/partition_table/partition-table.bin \
            0x10000 build/authstick.bin
          echo "SHA256=$(sha256sum ../web-flash/authstick-merged.bin | awk '{print $1}')" >> $GITHUB_ENV

      - name: Upload firmware to Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-flash/authstick-merged.bin
          body: |
            Automated build from tag ${{ github.ref_name }}
            SHA256: ${{ env.SHA256 }}
