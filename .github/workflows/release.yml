name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up partition table
        run: |
          # Use minimal partition: max space for app
          cat > firmware/partitions.csv << 'EOF'
          nvs,      data, nvs,     0x9000,  0x6000,
          phy_init, data, phy,     0xF000,  0x1000,
          factory,  app,  factory, 0x10000, 7M,
          EOF

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.2
          target: esp32s3
          path: firmware
          command: |
            pip install idf-component-manager
            idf.py build

      - name: Merge firmware
        run: |
          pip install esptool
          mkdir -p web-flash
          python -m esptool --chip esp32s3 merge_bin \
            -o web-flash/authstick-merged.bin \
            --flash_mode dio --flash_size 8MB --flash_freq 80m \
            0x0 firmware/build/bootloader/bootloader.bin \
            0x8000 firmware/build/partition_table/partition-table.bin \
            0x10000 firmware/build/authstick.bin
          sha256sum web-flash/authstick-merged.bin

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: web-flash/authstick-merged.bin
          body: |
            Automated build from ${{ github.ref_name }}
            Firmware: authstick-merged.bin
