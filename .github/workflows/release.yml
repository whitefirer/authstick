name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware and merged image
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.2
          target: esp32s3
          path: firmware
          command: |
            # Custom partition: max space for app
            cat > partitions.csv << 'CSV'
            nvs,      data, nvs,     0x9000,  0x6000,
            phy_init, data, phy,     0xF000,  0x1000,
            factory,  app,  factory, 0x10000, 0x7A0000,
            CSV
            echo "CONFIG_PARTITION_TABLE_CUSTOM=y" >> sdkconfig.defaults
            echo "CONFIG_PARTITION_TABLE_CUSTOM_FILENAME=\"partitions.csv\"" >> sdkconfig.defaults
            echo "CONFIG_PARTITION_TABLE_FILENAME=\"partitions.csv\"" >> sdkconfig.defaults
            echo "CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y" >> sdkconfig.defaults
            idf.py build
            mkdir -p ../dist
            cp build/authstick.bin ../dist/
            cd build
            esptool.py --chip esp32s3 merge_bin --flash_mode dio --flash_size 8MB --flash_freq 80m -o ../../dist/authstick-merged.bin 0x0 bootloader/bootloader.bin 0x8000 partition_table/partition-table.bin 0x10000 authstick.bin
            cd ../..
            sha256sum dist/authstick-merged.bin

      - name: Fix permissions
        run: sudo chown -R $(id -u):$(id -g) dist

      - name: Copy firmware to web-flash
        run: |
          cp dist/authstick-merged.bin web-flash/authstick-merged.bin
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f web-flash/authstick-merged.bin
          git diff --cached --quiet || git commit -m "release: update firmware binary (${{ github.ref_name }})"

      - name: Push to master
        run: git push origin master

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/authstick-merged.bin
          body: |
            Automated build from ${{ github.ref_name }}
